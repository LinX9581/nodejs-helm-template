# nodejs-helm-bn-template values

image:
  repository: asia-docker.pkg.dev/nownews-terraform/nodejs-dev-template/nodejs-dev-fn-template
  pullPolicy: IfNotPresent
  tag: "2.0.9"

service:
  type: ClusterIP
  port: 3022

application:
  port: 3022

configMap:
  create: true
  name: ""
  data:
    APP_ENV: "prod"
    PORT: "3022"

envFrom:
  configMap:
    enabled: true
    name: ""
  configMapRefs: []
  secretRefs:
    - nodejs-bn-template-secrets

# ---------- Resources ----------
resources:
  requests:
    cpu: 300m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1024Mi

# ---------- Autoscaling ----------
autoscaling:
  enabled: true
  minReplicas: 10
  maxReplicas: 30
  targetCPUUtilizationPercentage: 60

updateStrategy:
  type: RollingUpdate
  maxUnavailable: 0
  maxSurge: 1

nodeSelector:
  workload: app
tolerations: []
affinity: {}

gateway:
  enabled: true
  gatewayName: traefik-gateway
  gatewayNamespace: traefik
  routes:
    - hostname: nodejs-bn.linx.bar
  rules:
    - path: /
      pathType: PathPrefix
  redirectRoutes: []

healthCheckPolicy:
  enabled: false
  requestPath: /pod-health
  checkIntervalSec: 5
  timeoutSec: 5
  healthyThreshold: 2
  unhealthyThreshold: 2

otel:
  enabled: true
  injectorAnnotationKey: instrumentation.opentelemetry.io/inject-nodejs
  injectorAnnotationValue: "true"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: false
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
